<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #25d366;
      --primary-dark: #1a9e4a;
      --primary-light: rgba(37, 211, 102, 0.1);
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --surface-alt: #2d2d2d;
      --border: #333333;
      --text: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #808080;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 18px;
      color: var(--primary);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface-alt);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .app-container {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    aside {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
    }

    aside::-webkit-scrollbar {
      width: 6px;
    }

    aside::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .info-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
    }

    .info-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
    }

    .contacts-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .contacts-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contacts-list::-webkit-scrollbar {
      width: 6px;
    }

    .contacts-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .contact-item:hover {
      background: var(--surface-hover);
      border-color: var(--primary);
    }

    .contact-item.active {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #000;
      flex-shrink: 0;
    }

    .contact-info {
      flex: 1;
      min-width: 0;
    }

    .contact-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-preview {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }

    .empty-state {
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: var(--text-muted);
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .welcome-text {
      font-size: 14px;
      text-align: center;
      max-width: 400px;
      line-height: 1.7;
    }

    #chat-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .chat-contact-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-contact-info .name {
      font-weight: 600;
      font-size: 16px;
    }

    .chat-contact-info .phone {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      display: flex;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.inbound {
      justify-content: flex-start;
    }

    .message.outbound {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 60%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-text {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.inbound .message-text {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .message.outbound .message-text {
      background: var(--primary);
      color: #000;
      border: none;
    }

    .message-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      padding: 0 4px;
    }

    .message.outbound .message-meta {
      justify-content: flex-end;
    }

    .message-type {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      aside {
        width: 100%;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .message-bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">
        <span>💬</span>
        WhatsApp Dashboard
      </div>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span id="connection-status">Connected</span>
    </div>
  </header>

  <div class="app-container">
    <aside>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Stats</div>
        <div class="info-card">
          <div class="info-label">Total Messages</div>
          <div class="info-value" id="msg-count">0</div>
        </div>
        <div class="info-card">
          <div class="info-label">Active Contacts</div>
          <div class="info-value" id="contact-count">0</div>
        </div>
      </div>

      <div class="contacts-section">
        <div class="sidebar-section-title">Conversations</div>
        <ul class="contacts-list" id="contacts-list">
          <div class="empty-state">No conversations yet</div>
        </ul>
      </div>
    </aside>

    <main>
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">💬</div>
        <div class="welcome-title">WhatsApp Webhook Receiver</div>
        <div class="welcome-text">
          Select a conversation from the sidebar, or wait for new messages to arrive from WhatsApp.
        </div>
      </div>

      <div id="chat-view">
        <div class="chat-header">
          <div class="chat-contact-info">
            <div class="avatar" id="chat-avatar" style="width: 44px; height: 44px; font-size: 16px;"></div>
            <div>
              <div class="name" id="chat-contact-name"></div>
              <div class="phone" id="chat-contact-phone"></div>
            </div>
          </div>
        </div>
        <div class="messages-container" id="messages-container"></div>
      </div>
    </main>
  </div>

  <script>
    let contacts = {};
    let messages = {};
    let currentContact = null;

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

    ws.addEventListener('open', () => {
      console.log('WebSocket connected');
      updateConnectionStatus(true);
      loadInitialMessages();
    });

    ws.addEventListener('close', () => {
      console.log('WebSocket disconnected');
      updateConnectionStatus(false);
      setTimeout(() => location.reload(), 3000);
    });

    ws.addEventListener('error', (err) => {
      console.error('WebSocket error:', err);
      updateConnectionStatus(false);
    });

    ws.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.event === 'message') {
          handleNewMessage(data.data);
        } else if (data.event === 'status') {
          handleStatusUpdate(data.data);
        }
      } catch (err) {
        console.error('WebSocket message error:', err);
      }
    });

    async function loadInitialMessages() {
      try {
        const res = await fetch('/api/messages?limit=500');
        const data = await res.json();
        
        (data.messages || []).forEach(msg => {
          const phone = msg.from_phone;
          
          if (!contacts[phone]) {
            contacts[phone] = {
              phone,
              name: msg.from_name || phone,
              lastMessage: msg.text,
              lastTime: new Date(msg.received_at),
              unread: 0
            };
          }

          if (!messages[phone]) {
            messages[phone] = [];
          }

          messages[phone].push({
            id: msg.id,
            type: msg.type,
            text: msg.text,
            timestamp: Math.floor(new Date(msg.received_at).getTime() / 1000),
            direction: 'inbound'
          });
        });

        updateContactsList();
        updateStats();
      } catch (err) {
        console.error('Error loading messages:', err);
      }
    }

    function handleNewMessage(msg) {
      const phone = msg.from_phone || msg.from;
      
      if (!contacts[phone]) {
        contacts[phone] = {
          phone,
          name: msg.from_name || msg.name || phone,
          lastMessage: msg.text,
          lastTime: new Date(),
          unread: 0
        };
      }

      if (!messages[phone]) {
        messages[phone] = [];
      }

      messages[phone].push({
        id: msg.id,
        type: msg.type,
        text: msg.text,
        timestamp: Math.floor(Date.now() / 1000),
        direction: 'inbound'
      });

      if (currentContact !== phone) {
        contacts[phone].unread++;
      }

      updateContactsList();
      updateStats();
      
      if (currentContact === phone) {
        renderMessages(phone);
      }
    }

    function handleStatusUpdate(status) {
      console.log('Status update:', status);
    }

    function updateConnectionStatus(connected) {
      const el = document.getElementById('connection-status');
      el.textContent = connected ? 'Connected' : 'Disconnected';
    }

    function updateStats() {
      const totalMessages = Object.values(messages).reduce((sum, arr) => sum + arr.length, 0);
      document.getElementById('msg-count').textContent = totalMessages;
      document.getElementById('contact-count').textContent = Object.keys(contacts).length;
    }

    function updateContactsList() {
      const list = document.getElementById('contacts-list');
      const sorted = Object.values(contacts).sort((a, b) => b.lastTime - a.lastTime);

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-state">No conversations yet</div>';
        return;
      }

      list.innerHTML = sorted.map(contact => {
        const initials = contact.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        const isActive = currentContact === contact.phone;
        return `
          <li class="contact-item ${isActive ? 'active' : ''}" onclick="selectContact('${contact.phone}')">
            <div class="avatar">${initials}</div>
            <div class="contact-info">
              <div class="contact-name">${escapeHtml(contact.name)}</div>
              <div class="contact-preview">${escapeHtml(contact.lastMessage || '(No messages)')}</div>
            </div>
          </li>
        `;
      }).join('');
    }

    function selectContact(phone) {
      currentContact = phone;
      if (contacts[phone]) {
        contacts[phone].unread = 0;
      }
      updateContactsList();
      renderChatView();
    }

    function renderChatView() {
      if (!currentContact) return;

      const contact = contacts[currentContact];
      const chatView = document.getElementById('chat-view');
      const welcomeScreen = document.getElementById('welcome-screen');

      document.getElementById('chat-avatar').textContent = contact.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('chat-contact-name').textContent = contact.name;
      document.getElementById('chat-contact-phone').textContent = contact.phone;

      welcomeScreen.style.display = 'none';
      chatView.style.display = 'flex';

      renderMessages(currentContact);
    }

    function renderMessages(phone) {
      const container = document.getElementById('messages-container');
      const msgs = messages[phone] || [];

      if (msgs.length === 0) {
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">No messages</div>';
        return;
      }

      container.innerHTML = msgs.map(msg => {
        const time = new Date(msg.timestamp * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        return `
          <div class="message ${msg.direction}">
            <div class="message-bubble">
              <div class="message-text">${escapeHtml(msg.text)}</div>
              <div class="message-meta">
                <span class="message-type">${msg.type}</span>
                <span>${time}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    updateStats();
  </script>
</body>
</html>
